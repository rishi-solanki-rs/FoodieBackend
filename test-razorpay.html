<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Razorpay Test UI</title>
</head>
<body style="font-family: Arial, sans-serif; text-align: center; margin-top: 50px;">

    <h2>Test Razorpay Payment UI</h2>
    <p>Click the button below to open the Razorpay checkout overlay.</p>
    
    <button id="rzp-button1" style="padding: 10px 20px; font-size: 16px; background-color: #F37254; color: white; border: none; border-radius: 5px; cursor: pointer;">
        Pay Now
    </button>

    <!-- Paste the values you got from your Postman request here! -->
    <script>
        // 1. YOUR PUBLIC KEY ID
        const RAZORPAY_KEY_ID = "rzp_test_SP20ald9BJcKBu"; 
        
        // 2. THE ORDER ID FROM POSTMAN (Step 2)
        const RAZORPAY_ORDER_ID = "order_SP2iVQcYEboaUL";
        
        // 3. THE AMOUNT FROM POSTMAN (in paise, so 17595 means Rs. 175.95)
        const AMOUNT = 17595; 

        var options = {
            "key": RAZORPAY_KEY_ID, 
            "amount": AMOUNT, 
            "currency": "INR",
            "name": "Foodie Test Delivery",
            "description": "Test Transaction",
            "order_id": RAZORPAY_ORDER_ID, 
            "handler": function (response){
                // THIS RUNS WHEN PAYMENT IS SUCCESSFUL!
                alert("SUCCESS! You can now take these values and put them in Postman's verify-payment Step 3!");
                console.log("Payment ID:", response.razorpay_payment_id);
                console.log("Order ID:", response.razorpay_order_id);
                console.log("Signature:", response.razorpay_signature);
                
                document.body.innerHTML += `
                    <h3 style="color: green;">Payment Successful!</h3>
                    <p><b>razorpay_payment_id:</b> ${response.razorpay_payment_id}</p>
                    <p><b>razorpay_order_id:</b> ${response.razorpay_order_id}</p>
                    <p><b>razorpay_signature:</b> ${response.razorpay_signature}</p>
                    <p>Copy these into your Postman Body (or skip Postman signature generation and just paste these) to verify the payment on your backend!</p>
                `;
            },
            "prefill": {
                "name": "Test User",
                "email": "test@example.com",
                "contact": "9999999999"
            },
            "theme": {
                "color": "#F37254"
            }
        };

        var rzp1 = new Razorpay(options);
        rzp1.on('payment.failed', function (response){
                alert("Payment Failed - Check console for details");
                console.error(response.error);
        });

        document.getElementById('rzp-button1').onclick = function(e){
            rzp1.open();
            e.preventDefault();
        }
    </script>
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
</body>
</html>
