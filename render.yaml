services:
  - type: web
    name: foodpanda-backend
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "5000"
      - key: FIREBASE_SERVICE_ACCOUNT_BASE64
        sync: false
